<html>
    <head>
        <title>Cross-Origin Resource Sharing (CORS) Demo</title>
    </head>
    <body>
        <script>
            fetch('http://localhost:8080/api/v1/users/login', {
                method: 'POST',
                headers: {
                    Authorization: 'Basic ' + btoa('john:123456')
                }
            })
            .then((response) => response.json())
            .then((data) => {
                console.log('Success:', data)
            })
            .catch((error) => {
                console.log(error)
            })
        </script>
    </body>
</html>
